<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAFE Orientation</title>
<style>
  :root{
    --dark: #2d2d2d;
    --light-blue: #cdeaf6;
    --title-blue: #4fc3e8;
    --accent-orange: #e08030;
    --correct-green: #2e8b57;
    --white: #ffffff;
  }

  * { box-sizing: border-box; }

  html{ overflow-x: hidden; }

  body{
    margin: 0;
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
    background: var(--light-blue);
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- Menu screen ---------- */
  header{
    background: var(--dark);
    color: var(--white);
    padding: 36px 20px 30px;
    text-align: center;
  }

  header h1{
    margin: 0 0 8px;
    font-size: 2.1rem;
    line-height: 1.25;
  }

  header h1 .accent{
    color: var(--title-blue);
  }

  header p.subtitle{
    margin: 0 auto;
    max-width: 520px;
    font-size: 1.1rem;
    color: #d8d8d8;
    line-height: 1.5;
  }

  .overall-progress-wrap{
    max-width: 700px;
    margin: 22px auto 0;
    padding: 0 20px;
  }

  .overall-progress-label{
    font-size: 1rem;
    margin-bottom: 6px;
    color: var(--white);
    font-weight: bold;
  }

  .overall-progress-track{
    background: #4a4a4a;
    border-radius: 999px;
    height: 22px;
    width: 100%;
    overflow: hidden;
    border: 2px solid #1a1a1a;
  }

  .overall-progress-fill{
    background: var(--title-blue);
    height: 100%;
    width: 0%;
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  main.menu{
    max-width: 760px;
    margin: 0 auto;
    padding: 26px 20px 60px;
  }

  .activity-list{
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .activity-card{
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    text-align: left;
    background: var(--white);
    border: 3px solid var(--dark);
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    cursor: pointer;
    font-family: inherit;
    color: var(--dark);
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    min-width: 0;
  }

  .activity-card:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    background: #f5fbfd;
  }

  .activity-card:focus-visible{
    outline: 4px solid var(--accent-orange);
    outline-offset: 2px;
  }

  .activity-card.completed{
    border-color: var(--correct-green);
    background: #eefaf3;
  }

  .activity-num{
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--dark);
    color: var(--title-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: bold;
  }

  .activity-card.completed .activity-num{
    background: var(--correct-green);
    color: var(--white);
  }

  .activity-body{
    flex: 1;
    min-width: 0;
  }

  .activity-title{
    font-size: 1.2rem;
    font-weight: bold;
    line-height: 1.3;
    margin: 0 0 4px;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  .activity-desc{
    font-size: 0.98rem;
    color: #555;
    margin: 0 0 6px;
    line-height: 1.4;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  .activity-meta{
    font-size: 0.88rem;
    font-weight: bold;
    color: var(--dark);
  }

  .activity-meta .done-tag{
    color: var(--correct-green);
  }

  .activity-arrow{
    flex-shrink: 0;
    font-size: 1.6rem;
    color: var(--accent-orange);
  }

  footer.menu-footer{
    text-align: center;
    font-size: 0.9rem;
    color: #555;
    padding: 10px 20px 30px;
  }

  /* ---------- Viewer screen (iframe) ---------- */
  .viewer-bar{
    display: none;
    align-items: center;
    gap: 12px;
    background: var(--dark);
    color: var(--white);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .viewer-bar.show{
    display: flex;
  }

  .back-btn{
    flex-shrink: 0;
    background: var(--title-blue);
    color: var(--dark);
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 1rem;
    padding: 10px 16px;
    cursor: pointer;
    font-family: inherit;
  }

  .back-btn:hover{
    background: #7fd4f2;
  }

  .back-btn:focus-visible{
    outline: 4px solid var(--accent-orange);
    outline-offset: 2px;
  }

  .viewer-title{
    flex: 1;
    min-width: 0;
    font-size: 1.05rem;
    font-weight: bold;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  .viewer-wrap{
    display: none;
  }

  .viewer-wrap.show{
    display: block;
  }

  .activity-frame{
    display: block;
    width: 100%;
    border: none;
    height: calc(100vh - 52px);
  }

  .hidden{
    display: none !important;
  }

  @media (max-width: 600px){
    header{ padding: 26px 16px 22px; }
    header h1{ font-size: 1.55rem; }
    header p.subtitle{ font-size: 0.98rem; }
    .overall-progress-wrap{ padding: 0 16px; }
    main.menu{ padding: 20px 14px 40px; }
    .activity-card{ padding: 14px 14px; gap: 12px; }
    .activity-num{ width: 44px; height: 44px; font-size: 1.2rem; }
    .activity-title{ font-size: 1.05rem; }
    .activity-desc{ font-size: 0.92rem; }
    .activity-arrow{ font-size: 1.3rem; }
    .viewer-title{ font-size: 0.95rem; }
    .back-btn{ font-size: 0.92rem; padding: 9px 12px; }
  }

  @media (max-width: 360px){
    header h1{ font-size: 1.35rem; }
    .activity-card{ flex-wrap: wrap; }
    .activity-num{ width: 38px; height: 38px; font-size: 1.05rem; }
  }
</style>
</head>
<body>

<div id="menuScreen">
  <header>
    <h1><span class="accent">TAFE Orientation</span></h1>
    <p class="subtitle">Work through each activity below to learn what you need to know before starting at TAFE. Complete them in order.</p>
    <div class="overall-progress-wrap">
      <div class="overall-progress-label" id="overallProgressLabel">0 of 6 activities completed</div>
      <div class="overall-progress-track">
        <div class="overall-progress-fill" id="overallProgressFill"></div>
      </div>
    </div>
  </header>

  <main class="menu">
    <div class="activity-list" id="activityList"></div>
  </main>

  <footer class="menu-footer">Tap an activity to begin. You can come back to this menu at any time.</footer>
</div>

<div class="viewer-bar" id="viewerBar">
  <button class="back-btn" id="backBtn">&larr; Back to menu</button>
  <div class="viewer-title" id="viewerTitle">Activity</div>
</div>
<div class="viewer-wrap" id="viewerWrap">
  <iframe class="activity-frame" id="activityFrame" title="Activity content"></iframe>
</div>

<script>
  const activities = [
    {
      num: 1,
      file: "1tafe_classroomorientation_quiz.html",
      title: "Classroom Expectations",
      desc: "Learn the rules and expectations for behaving in the classroom.",
      questions: 18
    },
    {
      num: 2,
      file: "2tafe_safezone_quiz.html",
      title: "SafeZone App",
      desc: "Find out how to use the SafeZone app to stay safe on campus.",
      questions: 15
    },
    {
      num: 3,
      file: "3tafe_evacuation_assembly_quiz.html",
      title: "Emergency Evacuation & Assembly Points",
      desc: "Understand what to do and where to go in an emergency evacuation.",
      questions: 18
    },
    {
      num: 4,
      file: "4tafe_lockdown_quiz.html",
      title: "Lockdown Procedure",
      desc: "Learn the correct steps to follow during a lockdown.",
      questions: 16
    },
    {
      num: 5,
      file: "5complaints_quiz.html",
      title: "Complaints",
      desc: "Know how and when to raise a complaint or concern.",
      questions: 15
    },
    {
      num: 6,
      file: "6tafe_academic_integrity_quiz.html",
      title: "Academic Integrity",
      desc: "Understand the values behind academic honesty and integrity.",
      questions: 15
    }
  ];

  const STORAGE_KEY = "tafeOrientationCompleted";

  function getCompleted(){
    try {
      const raw = sessionStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function setCompleted(list){
    try {
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    } catch (e) {
      /* storage unavailable, ignore */
    }
  }

  function markCompleted(file){
    const done = getCompleted();
    if (!done.includes(file)) {
      done.push(file);
      setCompleted(done);
    }
    renderMenu();
  }

  const menuScreen = document.getElementById('menuScreen');
  const activityList = document.getElementById('activityList');
  const overallProgressFill = document.getElementById('overallProgressFill');
  const overallProgressLabel = document.getElementById('overallProgressLabel');

  const viewerBar = document.getElementById('viewerBar');
  const viewerWrap = document.getElementById('viewerWrap');
  const viewerTitle = document.getElementById('viewerTitle');
  const activityFrame = document.getElementById('activityFrame');
  const backBtn = document.getElementById('backBtn');

  function renderMenu(){
    const done = getCompleted();
    activityList.innerHTML = '';

    activities.forEach(a => {
      const isDone = done.includes(a.file);
      const card = document.createElement('button');
      card.className = 'activity-card' + (isDone ? ' completed' : '');
      card.setAttribute('type', 'button');
      card.addEventListener('click', () => openActivity(a));

      card.innerHTML =
        '<div class="activity-num">' + a.num + '</div>' +
        '<div class="activity-body">' +
          '<div class="activity-title"></div>' +
          '<div class="activity-desc"></div>' +
          '<div class="activity-meta"></div>' +
        '</div>' +
        '<div class="activity-arrow">&rsaquo;</div>';

      card.querySelector('.activity-title').textContent = a.title;
      card.querySelector('.activity-desc').textContent = a.desc;
      const meta = card.querySelector('.activity-meta');
      if (isDone) {
        meta.innerHTML = '<span class="done-tag">&#10003; Completed</span> &middot; ' + a.questions + ' questions';
      } else {
        meta.textContent = a.questions + ' questions';
      }

      activityList.appendChild(card);
    });

    const pct = Math.round((done.length / activities.length) * 100);
    overallProgressFill.style.width = pct + '%';
    overallProgressLabel.textContent = done.length + ' of ' + activities.length + ' activities completed';
  }

  let currentFile = null;

  function openActivity(a){
    viewerTitle.textContent = a.num + '. ' + a.title;
    currentFile = a.file;
    activityFrame.src = a.file;
    menuScreen.classList.add('hidden');
    viewerBar.classList.add('show');
    viewerWrap.classList.add('show');
    window.scrollTo(0, 0);
  }

  function closeActivity(){
    viewerBar.classList.remove('show');
    viewerWrap.classList.remove('show');
    menuScreen.classList.remove('hidden');
    activityFrame.src = '';
    currentFile = null;
    window.scrollTo(0, 0);
  }

  // Each quiz file posts a message to its parent once the person reaches
  // its results screen. This works even when the hub and its activities
  // are opened directly from disk (file://), where cross-origin rules
  // would otherwise block reading the iframe's contents directly.
  window.addEventListener('message', (event) => {
    const data = event.data;
    if (data && data.type === 'tafe-activity-complete' && currentFile) {
      markCompleted(currentFile);
    }
  });

  backBtn.addEventListener('click', closeActivity);

  renderMenu();
</script>

</body>
</html>
